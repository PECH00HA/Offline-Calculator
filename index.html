<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khalid Ali Pechuha Calculator</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden; }
        .calculator { background: #2d2d2d; padding: 20px; border-radius: 25px; width: 100%; max-width: 350px; border: 3px solid #f1c40f; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .owner { color: #f1c40f; text-align: center; font-weight: bold; margin-bottom: 15px; font-size: 1.2rem; text-transform: uppercase; }
        #display { width: 100%; height: 60px; font-size: 2rem; text-align: right; margin-bottom: 20px; padding: 15px; border: none; border-radius: 10px; background: #000; color: #f1c40f; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 20px; font-size: 1.2rem; border: none; border-radius: 10px; cursor: pointer; background: #444; color: white; transition: 0.1s; font-weight: bold; }
        button:active { transform: scale(0.92); background: #666; }
        .op { background: #d35400; }
        .eq { background: #27ae60; grid-column: span 2; }
    </style>
</head>
<body>

<div class="calculator">
    <div class="owner">Khalid Ali Pechuha</div>
    <input type="text" id="display" readonly placeholder="0">
    <div class="grid">
        <button onclick="calc('C')" style="color:red">C</button>
        <button onclick="calc('DEL')">DEL</button>
        <button class="op" onclick="calc('/')">/</button>
        <button class="op" onclick="calc('*')">×</button>
        <button onclick="calc('7')">7</button><button onclick="calc('8')">8</button><button onclick="calc('9')">9</button>
        <button class="op" onclick="calc('-')">-</button>
        <button onclick="calc('4')">4</button><button onclick="calc('5')">5</button><button onclick="calc('6')">6</button>
        <button class="op" onclick="calc('+')">+</button>
        <button onclick="calc('1')">1</button><button onclick="calc('2')">2</button><button onclick="calc('3')">3</button>
        <button onclick="calc('.')">.</button>
        <button onclick="calc('0')" style="grid-column: span 2;">0</button>
        <button class="eq" onclick="calc('=')">=</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    
    // Offline Tick Sound (Base64 data)
    const tickSound = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAAABmYWN0BAAAAAAAAABkYXRhAAAAAA==");

    function calc(val) {
        tickSound.currentTime = 0;
        tickSound.play().catch(e => {}); // Silent play for offline support
        
        if (val === 'C') display.value = "";
        else if (val === 'DEL') display.value = display.value.slice(0, -1);
        else if (val === '=') {
            try { display.value = eval(display.value.replace('×', '*')); }
            catch { display.value = "Error"; }
        } else {
            display.value += val;
        }
    }
</script>
</body>
</html>
