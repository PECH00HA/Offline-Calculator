<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khalid Ali Pechuha - Pro Calculator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: manipulation; }
        body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; font-family: 'Arial', sans-serif; overflow: hidden; }

        .calculator-body {
            background: #d6dadb;
            width: 100vw;
            height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        .header-section { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px; padding: 0 5px; }
        .brand-left { flex: 1; position: relative; }

        /* Calligraphy Durood with sparkle & fireworks container */
        .durood-calligraphy {
            position: relative;
            display: inline-block;
            font-size: 36px;
            color: #1a1a1a;
            font-family: 'Amiri', 'Noto Naskh Arabic', 'Traditional Arabic', 'Scheherazade New', 'Lateef', serif;
            font-weight: 700;
            line-height: 1.2;
            text-shadow: 0 0 8px rgba(255,215,0,0.9), 0 0 15px rgba(255,215,0,0.5);
            animation: gentleGlow 2s infinite alternate;
        }

        @keyframes gentleGlow {
            0% { text-shadow: 0 0 8px rgba(255,215,0,0.9), 0 0 15px rgba(255,215,0,0.5); }
            100% { text-shadow: 0 0 15px rgba(255,215,0,1), 0 0 25px rgba(255,215,0,0.8), 0 0 40px rgba(255,140,0,0.6); }
        }

        .brand-sub { font-size: 9px; color: #555; font-weight: bold; display: block; margin-top: 2px; }

        /* Sparkles & mini fireworks */
        .sparkles-container {
            position: absolute;
            top: -15px;
            left: -10px;
            width: calc(100% + 40px);
            height: calc(100% + 30px);
            pointer-events: none;
        }

        .sparkle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: gold;
            border-radius: 50%;
            box-shadow: 0 0 6px gold, 0 0 12px orange;
            animation: sparkleFloat 1.5s infinite ease-in-out;
            opacity: 0;
        }

        @keyframes sparkleFloat {
            0% { transform: translate(0, 0) scale(0); opacity: 0; }
            50% { transform: translate(var(--dx), var(--dy)) scale(1.2); opacity: 1; }
            100% { transform: translate(calc(var(--dx)*2), calc(var(--dy)*2)) scale(0); opacity: 0; }
        }

        .sparkle:nth-child(1) { top: 0; left: 5%; --dx: 15px; --dy: -20px; animation-delay: 0s; }
        .sparkle:nth-child(2) { top: 0; left: 25%; --dx: -10px; --dy: -18px; animation-delay: 0.2s; }
        .sparkle:nth-child(3) { top: 5px; left: 50%; --dx: 12px; --dy: -25px; animation-delay: 0.4s; }
        .sparkle:nth-child(4) { top: -5px; left: 70%; --dx: -15px; --dy: -15px; animation-delay: 0.6s; }
        .sparkle:nth-child(5) { top: 0; left: 90%; --dx: 10px; --dy: -22px; animation-delay: 0.8s; }
        .sparkle:nth-child(6) { top: 10px; left: 10%; --dx: 18px; --dy: -8px; animation-delay: 0.3s; }
        .sparkle:nth-child(7) { top: 15px; left: 80%; --dx: -14px; --dy: -10px; animation-delay: 0.7s; }
        .sparkle:nth-child(8) { top: 5px; left: 40%; --dx: -12px; --dy: -20px; animation-delay: 0.1s; }

        /* Mini fireworks burst (colored particles) */
        .firework {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #ff4500;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff4500, 0 0 14px #ff6347;
            animation: fireworkBurst 2s infinite;
            opacity: 0;
        }

        @keyframes fireworkBurst {
            0% { transform: scale(0) translate(0,0); opacity: 1; }
            50% { transform: scale(1) translate(var(--fx), var(--fy)); opacity: 0.8; }
            100% { transform: scale(0) translate(calc(var(--fx)*2), calc(var(--fy)*2)); opacity: 0; }
        }

        .firework:nth-child(1) { top: 50%; left: 50%; --fx: -25px; --fy: -30px; background: #ff0; box-shadow:0 0 8px #ff0; animation-delay:0s; }
        .firework:nth-child(2) { top: 50%; left: 50%; --fx: 25px; --fy: -30px; background: #f0f; box-shadow:0 0 8px #f0f; animation-delay:0.3s; }
        .firework:nth-child(3) { top: 50%; left: 50%; --fx: -35px; --fy: 10px; background: #0ff; box-shadow:0 0 8px #0ff; animation-delay:0.6s; }
        .firework:nth-child(4) { top: 50%; left: 50%; --fx: 35px; --fy: 10px; background: #f90; box-shadow:0 0 8px #f90; animation-delay:0.9s; }
        .firework:nth-child(5) { top: 50%; left: 50%; --fx: 0px; --fy: -40px; background: #f44; box-shadow:0 0 8px #f44; animation-delay:0.2s; }
        .firework:nth-child(6) { top: 50%; left: 50%; --fx: 20px; --fy: 25px; background: #4f4; box-shadow:0 0 8px #4f4; animation-delay:0.5s; }

        .solar-container { display: flex; flex-direction: column; align-items: center; }
        .solar-panel { background: linear-gradient(to right, #3a2010, #4a2a18, #3a2010); width: 75px; height: 25px; border: 2px solid #555; border-radius: 3px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .solar-line { background: rgba(0,0,0,0.3); height: 100%; }

        .lcd-screen-container { background: #8e9e8c; border: 4px solid #a4b4a0; border-radius: 6px; box-shadow: inset 0 5px 10px rgba(0,0,0,0.5), 0 2px 2px white; padding: 10px; margin-bottom: 20px; }
        #display { width: 100%; height: 65px; font-size: 38px; text-align: right; border: none; background: transparent; color: #1c241b; font-family: 'Courier New', Courier, monospace; font-weight: bold; overflow: hidden; pointer-events: none; letter-spacing: 1px; }

        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; flex-grow: 1; margin-bottom: 10px; }
        button { font-size: 24px; font-weight: bold; border: 1px solid #999; border-radius: 6px; cursor: pointer; transition: all 0.01s linear; box-shadow: 0 5px #b5b9ba, inset 0 1px 1px white; display: flex; justify-content: center; align-items: center; }
        .num { background: #f1f2f6; color: #2f3542; }
        .num:active { box-shadow: 0 1px #b5b9ba; transform: translateY(4px); background: #e4e7eb; }
        .op { background: #4b5563; color: white; border-color: #333; box-shadow: 0 5px #2d3748; }
        .op:active { box-shadow: 0 1px #2d3748; transform: translateY(4px); background: #374151; }
        .clear-btn { background: #dc2626; color: white; border-color: #991b1b; box-shadow: 0 5px #991b1b; font-size: 18px; }
        .clear-btn:active { box-shadow: 0 1px #991b1b; transform: translateY(4px); background: #b91c1c; }
        .equal-btn { background: #2563eb; color: white; border-color: #1d4ed8; box-shadow: 0 5px #1d4ed8; }
        .equal-btn:active { box-shadow: 0 1px #1d4ed8; transform: translateY(4px); background: #1d4ed8; }
    </style>
</head>
<body>

<div class="calculator-body">
    <div class="header-section">
        <div class="brand-left">
            <!-- Durood in calligraphy with sparkles and mini fireworks -->
            <div class="durood-calligraphy">
                ﷺ
                <div class="sparkles-container">
                    <!-- Sparkles -->
                    <div class="sparkle"></div>
                    <div class="sparkle"></div>
                    <div class="sparkle"></div>
                    <div class="sparkle"></div>
                    <div class="sparkle"></div>
                    <div class="sparkle"></div>
                    <div class="sparkle"></div>
                    <div class="sparkle"></div>
                    <!-- Mini fireworks bursts -->
                    <div class="firework"></div>
                    <div class="firework"></div>
                    <div class="firework"></div>
                    <div class="firework"></div>
                    <div class="firework"></div>
                    <div class="firework"></div>
                </div>
            </div>
            <span class="brand-sub">Khalid Ali Pechuha</span>
        </div>
        <div class="solar-container">
            <!-- Panda removed, only solar panel remains -->
            <div class="solar-panel">
                <div class="solar-line"></div>
                <div class="solar-line"></div>
                <div class="solar-line"></div>
            </div>
        </div>
    </div>

    <div class="lcd-screen-container">
        <input type="text" id="display" readonly placeholder="0">
    </div>

    <div class="keypad">
        <button class="clear-btn" onpointerdown="press('C')">AC</button>
        <button class="clear-btn" onpointerdown="press('DEL')">⌫</button>
        <button class="op" onpointerdown="press('/')">÷</button>
        <button class="op" onpointerdown="press('*')">×</button>

        <button class="num" onpointerdown="press('7')">7</button>
        <button class="num" onpointerdown="press('8')">8</button>
        <button class="num" onpointerdown="press('9')">9</button>
        <button class="op" onpointerdown="press('-')">-</button>

        <button class="num" onpointerdown="press('4')">4</button>
        <button class="num" onpointerdown="press('5')">5</button>
        <button class="num" onpointerdown="press('6')">6</button>
        <button class="op" onpointerdown="press('+')">+</button>

        <button class="num" onpointerdown="press('1')">1</button>
        <button class="num" onpointerdown="press('2')">2</button>
        <button class="num" onpointerdown="press('3')">3</button>
        <button class="equal-btn" onpointerdown="press('=')" style="grid-row: span 2; height: calc(100% - 5px);">=</button>

        <button class="num" onpointerdown="press('0')" style="grid-column: span 2;">0</button>
        <button class="num" onpointerdown="press('.')">•</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    let audioCtx = null;

    const tones = {
        '1': 4000, '2': 4200, '3': 4400, '4': 4600, '5': 4800,
        '6': 5000, '7': 5200, '8': 5400, '9': 5600, '0': 3800,
        '+': 5800, '-': 5700, '*': 5900, '/': 6000,
        '=': 6500, 'C': 3500, 'DEL': 3600, '.': 3700
    };

    function playTickTone(val) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(tones[val] || 4500, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.015);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.015);
        } catch (e) {}
    }

    function press(val) {
        playTickTone(val);
        if (val === 'C') display.value = "";
        else if (val === 'DEL') display.value = display.value.slice(0, -1);
        else if (val === '=') {
            try {
                let res = eval(display.value.replace(/[+\-*/]+$/, ""));
                display.value = Number.isInteger(res) ? res : parseFloat(res.toFixed(6));
            } catch { display.value = "ERROR"; }
        } else {
            const ops = ['+', '-', '*', '/'];
            if (ops.includes(val) && ops.includes(display.value.slice(-1))) display.value = display.value.slice(0, -1) + val;
            else if (display.value === "0" || display.value === "ERROR") display.value = val;
            else display.value += val;
        }
    }
</script>
</body>
</html>
