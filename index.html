<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khalid Ali Pechuha - Pro Calculator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: manipulation; }
        body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; font-family: 'Arial', sans-serif; overflow: hidden; }
        
        .calculator-body { 
            background: #d6dadb; 
            width: 100vw; 
            height: 100vh; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        .header-section { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px; padding: 0 5px; }
        
        .brand-name { color: #333; font-size: 18px; letter-spacing: 0.5px; text-transform: uppercase; }
        .brand-name strong { font-weight: 900; color: #000; font-size: 20px; text-shadow: 1px 1px 0px rgba(255,255,255,0.7); }
        .brand-sub { font-size: 9px; color: #555; font-weight: bold; margin-top: 2px; display: block; }
        
        .solar-container { display: flex; flex-direction: column; align-items: center; position: relative; }
        
        /* Panda ko bada aur clear kar diya gaya hai */
        .panda-icon { 
            font-size: 28px; 
            margin-bottom: -2px; /* Solar panel ke theek ooper bitha diya */
            animation: bouncePanda 2s infinite; 
            z-index: 10;
        }
        
        @keyframes bouncePanda { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-5px); } 
        }

        .solar-panel { background: linear-gradient(to right, #3a2010, #4a2a18, #3a2010); width: 75px; height: 25px; border: 2px solid #555; border-radius: 3px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; position: relative; z-index: 5; }
        .solar-line { background: rgba(0,0,0,0.3); height: 100%; }

        .lcd-screen-container { background: #8e9e8c; border: 4px solid #a4b4a0; border-radius: 6px; box-shadow: inset 0 5px 10px rgba(0,0,0,0.5), 0 2px 2px white; padding: 10px; margin-bottom: 20px; }
        #display { width: 100%; height: 65px; font-size: 38px; text-align: right; border: none; background: transparent; color: #1c241b; font-family: 'Courier New', Courier, monospace; font-weight: bold; overflow: hidden; pointer-events: none; letter-spacing: 1px; }

        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; flex-grow: 1; margin-bottom: 10px; }
        
        button { 
            font-size: 24px; 
            font-weight: bold; 
            border: 1px solid #999; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.05s ease;
            box-shadow: 0 5px #b5b9ba, inset 0 1px 1px white;
            display: flex; justify-content: center; align-items: center;
        }
        
        .num { background: #f1f2f6; color: #2f3542; }
        .num:active { box-shadow: 0 1px #b5b9ba; transform: translateY(4px); background: #e4e7eb; }
        
        .op { background: #4b5563; color: white; border-color: #333; box-shadow: 0 5px #2d3748; }
        .op:active { box-shadow: 0 1px #2d3748; transform: translateY(4px); background: #374151; }
        
        .clear-btn { background: #dc2626; color: white; border-color: #991b1b; box-shadow: 0 5px #991b1b; font-size: 18px; }
        .clear-btn:active { box-shadow: 0 1px #991b1b; transform: translateY(4px); background: #b91c1c; }
        
        .equal-btn { background: #2563eb; color: white; border-color: #1d4ed8; box-shadow: 0 5px #1d4ed8; }
        .equal-btn:active { box-shadow: 0 1px #1d4ed8; transform: translateY(4px); background: #1d4ed8; }
    </style>
</head>
<body>

<div class="calculator-body">
    <div class="header-section">
        <div style="padding-bottom: 5px;">
            <div class="brand-name"><strong>KHALID ALI</strong> PECHUHA</div>
            <span class="brand-sub">DIGITAL SYNTH CALCULATOR</span>
        </div>
        <div class="solar-container">
            <!-- Yahan HTML Code lagaya hai taake har hal mein show ho -->
            <div class="panda-icon">&#128060;</div>
            <div class="solar-panel">
                <div class="solar-line"></div>
                <div class="solar-line"></div>
                <div class="solar-line"></div>
            </div>
        </div>
    </div>

    <div class="lcd-screen-container">
        <input type="text" id="display" readonly placeholder="0">
    </div>

    <div class="keypad">
        <button class="clear-btn" onclick="press('C')">AC</button>
        <button class="clear-btn" onclick="press('DEL')">DEL</button>
        <button class="op" onclick="press('/')">÷</button>
        <button class="op" onclick="press('*')">×</button>
        
        <button class="num" onclick="press('7')">7</button>
        <button class="num" onclick="press('8')">8</button>
        <button class="num" onclick="press('9')">9</button>
        <button class="op" onclick="press('-')">-</button>
        
        <button class="num" onclick="press('4')">4</button>
        <button class="num" onclick="press('5')">5</button>
        <button class="num" onclick="press('6')">6</button>
        <button class="op" onclick="press('+')">+</button>
        
        <button class="num" onclick="press('1')">1</button>
        <button class="num" onclick="press('2')">2</button>
        <button class="num" onclick="press('3')">3</button>
        <button class="equal-btn" onclick="press('=')" style="grid-row: span 2; height: calc(100% - 5px);">=</button>
        
        <button class="num" onclick="press('0')" style="grid-column: span 2;">0</button>
        <button class="num" onclick="press('.')">•</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    let audioCtx = null;

    const tones = {
        '1': 300, '2': 330, '3': 360, '4': 390, '5': 420, 
        '6': 450, '7': 480, '8': 510, '9': 540, '0': 270,
        '+': 600, '-': 580, '*': 620, '/': 640, 
        '=': 700, 'C': 200, 'DEL': 220, '.': 250
    };

    function playSynthTone(val) {
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            let frequency = tones[val] || 400;
            
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime); 
            
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1); 
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } catch (e) {}
    }

    function press(val) {
        playSynthTone(val); 
        
        if (val === 'C') {
            display.value = "";
        } else if (val === 'DEL') {
            display.value = display.value.slice(0, -1);
        } else if (val === '=') {
            if (display.value === "" || display.value === "ERROR") return;
            
            let expression = display.value;
            expression = expression.replace(/[+\-*/]+$/, "");
            
            if (expression === "") {
                display.value = "";
                return;
            }

            try {
                let result = eval(expression);
                if (result % 1 !== 0) {
                    result = parseFloat(result.toFixed(6));
                }
                display.value = result;
            } catch (err) {
                display.value = "ERROR";
            }
        } else {
            const operators = ['+', '-', '*', '/'];
            
            if (operators.includes(val)) {
                if (display.value === "" || display.value === "ERROR") return;
                
                if (operators.includes(display.value.slice(-1))) {
                    display.value = display.value.slice(0, -1) + val;
                    return;
                }
            }

            if (display.value === "0" || display.value === "ERROR") {
                display.value = val;
            } else {
                display.value += val;
            }
        }
    }

    document.body.addEventListener('touchstart', function() {
        if(audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }, {passive: true});
</script>

</body>
</html>
