<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khalid Ali Pechuha - Classic Calculator</title>
    <style>
        /* Full Screen & Reset Settings */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: manipulation; }
        body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; font-family: 'Arial', sans-serif; overflow: hidden; }
        
        /* Casio Retro Body Container */
        .calculator-body { 
            background: #d6dadb; /* Classic Casio Light Grey */
            width: 100vw; 
            height: 100vh; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        /* Header Section (Brand Name & Solar Panel) */
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px; }
        
        /* Casio Style Name Printing */
        .brand-name { color: #1e272e; font-size: 18px; font-weight: 900; letter-spacing: 1px; font-family: 'Helvetica Neue', Arial, sans-serif; text-transform: uppercase; }
        .brand-sub { font-size: 9px; color: #555; font-weight: bold; margin-top: 2px; display: block; }
        
        /* Realistic Solar Panel */
        .solar-panel { background: linear-gradient(to right, #3a2010, #4a2a18, #3a2010); width: 75px; height: 25px; border: 2px solid #555; border-radius: 3px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .solar-line { background: rgba(0,0,0,0.3); height: 100%; }

        /* Old LCD Display Screen */
        .lcd-screen-container { background: #8e9e8c; border: 4px solid #a4b4a0; border-radius: 6px; box-shadow: inset 0 5px 10px rgba(0,0,0,0.5), 0 2px 2px white; padding: 10px; margin-bottom: 20px; }
        #display { width: 100%; height: 65px; font-size: 38px; text-align: right; border: none; background: transparent; color: #1c241b; font-family: 'Courier New', Courier, monospace; font-weight: bold; overflow: hidden; pointer-events: none; letter-spacing: 1px; }

        /* Buttons Keypad Grid */
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; flex-grow: 1; margin-bottom: 10px; }
        
        /* Classic 3D Buttons Styling */
        button { 
            font-size: 24px; 
            font-weight: bold; 
            border: 1px solid #999; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.05s ease;
            box-shadow: 0 5px #b5b9ba, inset 0 1px 1px white;
            display: flex; justify-content: center; align-items: center;
        }
        
        /* Numbers Buttons (Light Grey) */
        .num { background: #f1f2f6; color: #2f3542; }
        .num:active { box-shadow: 0 1px #b5b9ba; transform: translateY(4px); background: #e4e7eb; }
        
        /* Operators Buttons (Dark Grey) */
        .op { background: #4b5563; color: white; border-color: #333; box-shadow: 0 5px #2d3748; }
        .op:active { box-shadow: 0 1px #2d3748; transform: translateY(4px); background: #374151; }
        
        /* Clear / Delete Buttons (Retro Muted Red) */
        .clear-btn { background: #dc2626; color: white; border-color: #991b1b; box-shadow: 0 5px #991b1b; font-size: 18px; }
        .clear-btn:active { box-shadow: 0 1px #991b1b; transform: translateY(4px); background: #b91c1c; }
        
        /* Equal Button (Classic Blue/Green) */
        .equal-btn { background: #2563eb; color: white; border-color: #1d4ed8; box-shadow: 0 5px #1d4ed8; }
        .equal-btn:active { box-shadow: 0 1px #1d4ed8; transform: translateY(4px); background: #1d4ed8; }
    </style>
</head>
<body>

<div class="calculator-body">
    <!-- Header Area with Owner Name and Solar Panel -->
    <div class="header-section">
        <div>
            <div class="brand-name">KHALID ALI PECHUHA</div>
            <span class="brand-sub">ELECTRONIC CALCULATOR</span>
        </div>
        <div class="solar-panel">
            <div class="solar-line"></div>
            <div class="solar-line"></div>
            <div class="solar-line"></div>
        </div>
    </div>

    <!-- Old LCD Display -->
    <div class="lcd-screen-container">
        <input type="text" id="display" readonly placeholder="0">
    </div>

    <!-- Casio Classic Keypad -->
    <div class="keypad">
        <button class="clear-btn" onclick="press('C')">AC</button>
        <button class="clear-btn" onclick="press('DEL')">DEL</button>
        <button class="op" onclick="press('/')">÷</button>
        <button class="op" onclick="press('*')">×</button>
        
        <button class="num" onclick="press('7')">7</button>
        <button class="num" onclick="press('8')">8</button>
        <button class="num" onclick="press('9')">9</button>
        <button class="op" onclick="press('-')">-</button>
        
        <button class="num" onclick="press('4')">4</button>
        <button class="num" onclick="press('5')">5</button>
        <button class="num" onclick="press('6')">6</button>
        <button class="op" onclick="press('+')">+</button>
        
        <button class="num" onclick="press('1')">1</button>
        <button class="num" onclick="press('2')">2</button>
        <button class="num" onclick="press('3')">3</button>
        <button class="equal-btn" onclick="press('=')" style="grid-row: span 2; height: calc(100% - 5px);">=</button>
        
        <button class="num" onclick="press('0')" style="grid-column: span 2;">0</button>
        <button class="num" onclick="press('.')">•</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    // 100% Offline Hardware-Level Tick Sound Generator
    function playTickSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'triangle'; 
            oscillator.frequency.setValueAtTime(500, audioCtx.currentTime); // Crisp mechanical sound
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04); // Very short click
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.04);
        } catch (e) {
            // Safe fallback for older android webviews
        }
    }

    // Calculator Logic
    function press(val) {
        playTickSound(); // Har button press par awaz aayegi
        
        if (val === 'C') {
            display.value = "";
        } else if (val === 'DEL') {
            display.value = display.value.slice(0, -1);
        } else if (val === '=') {
            if (display.value === "") return;
            try {
                // Formatting equations safely
                let result = eval(display.value);
                // Decimal points handle karne ke liye
                if (result % 1 !== 0) {
                    result = parseFloat(result.toFixed(6));
                }
                display.value = result;
            } catch (err) {
                display.value = "ERROR";
            }
        } else {
            if (display.value === "0" || display.value === "ERROR") {
                display.value = val;
            } else {
                display.value += val;
            }
        }
    }
</script>

</body>
</html>
